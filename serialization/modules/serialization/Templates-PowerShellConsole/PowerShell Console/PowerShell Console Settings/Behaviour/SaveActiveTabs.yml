  - ID: "19a69332-a23e-4e70-8d16-b2640cb24cc8"
    Hint: Title
    Value: Save active tabs
  - ID: "577f1689-7de4-4ad2-a15f-7fdc1759285f"
    Hint: __Long description
    Value: Indicates that the full set of open tabs in the PowerShell ISE will be saved to the user settings item after script execution. When the PowerShell ISE is reopened every tab is restored, including its unsaved content, and the previously active tab is selected. Tabs whose source script was deleted are kept with their last known content so the work can be saved elsewhere. This is helpful for resuming work across sessions or recovering after the ISE is closed by mistake, however it is not a substitute for saving scripts to the script library.
  - ID: "9541e67d-ce8c-4225-803d-33f7f29f09ef"
    Hint: __Short description
    Value: Restores every open tab to the ISE when reopened
