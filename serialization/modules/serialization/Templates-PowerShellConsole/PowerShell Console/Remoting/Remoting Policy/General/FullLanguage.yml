    Hint: Title
    Value: Full Language
  - ID: "577f1689-7de4-4ad2-a15f-7fdc1759285f"
    Hint: __Long description
    Value: "When checked, scripts run in FullLanguage mode and can instantiate any .NET type (database connections, file I/O, reflection). Allowed Commands has no effect in this mode because a script can reach the full .NET surface regardless of which cmdlets are listed. When unchecked (default), scripts run in ConstrainedLanguage: .NET access is limited to core types and only commands listed in Allowed Commands are permitted."
  - ID: "9541e67d-ce8c-4225-803d-33f7f29f09ef"
    Hint: __Short description
    Value: "Give scripts unrestricted access to the entire .NET surface. When unchecked (ConstrainedLanguage, default), Allowed Commands is enforced and non-core .NET types are blocked."
