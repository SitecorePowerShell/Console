- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    <#
    .SYNOPSIS
        Builder functions for constructing Find-Item search queries with less boilerplate.
    
    .DESCRIPTION
        Provides a fluent API for building Sitecore ContentSearch queries that automatically handles:
        - Criteria construction and composition
        - Predicate grouping (AND/OR)
        - Pagination with auto-advance
        - Date range shorthand with relative syntax
        - Filter type discovery
        - Result metadata (truncation, index info)
    
    .EXAMPLE
        Import-Function -Name SearchBuilder
    
        $search = New-SearchBuilder -Index "sitecore_master_index" -First 25
        $search | Add-TemplateFilter -Name "Sample Item"
        $search | Add-FieldContains -Field "Title" -Value "Welcome"
        $results = $search | Invoke-Search
    
        $results.Items | ForEach-Object { Write-Host $_.Name }
    
    .NOTES
        Usage: You must call Import-Function -Name SearchBuilder before using any of these functions.
    
        Version: 1.0.0
        Date: 2026-03-30
        Author: SPE Community
    #>
    
    function New-SearchBuilder {
        <#
        .SYNOPSIS
            Creates a new search builder instance.
    
        .PARAMETER Index
            The name of the Sitecore search index to query.
    
        .PARAMETER Path
            Scope the search to descendants of this item path.
    
        .PARAMETER OrderBy
            Field name to sort results by. Use "score" for relevance sorting.
    
        .PARAMETER First
            Number of results per page. Used for pagination.
    
        .PARAMETER Skip
            Number of results to skip. Auto-managed when paginating with Invoke-Search.
    
        .PARAMETER Last
            Take the last N results.
    
        .PARAMETER MaxResults
            Safety cap on total results. When set, Invoke-Search marks results as
            Truncated if more matches exist. If First is not set, MaxResults acts as First.
    
        .PARAMETER Strict
            Validate field names against the index schema before executing.
            Throws an error if a field is not indexed.
    
        .PARAMETER IncludeMetadata
            Include index metadata (IndexName, IndexLastUpdated) in results.
    
        .PARAMETER Property
            Select only specific fields from the index for performance. Returns
            anonymous objects with only the requested properties instead of full
            SearchResultItem objects. Note: -Last is not supported with -Property.
    
        .PARAMETER QueryType
            A custom SearchResultItem subclass type for strongly-typed index fields.
            The type must inherit from SearchResultItem or implement ISearchResult.
    
        .PARAMETER FacetOn
            Field names to facet on. When specified, Invoke-Search returns facet
            category results instead of items.
    
        .PARAMETER FacetMinCount
            Minimum count for a facet value to be included (default: 1).
    
        .EXAMPLE
            $search = New-SearchBuilder -Index "sitecore_master_index"
    
        .EXAMPLE
            $search = New-SearchBuilder -Index "sitecore_master_index" -First 50 -MaxResults 500
    
        .EXAMPLE
            $search = New-SearchBuilder -Index "sitecore_master_index" -Property @("_name", "_path", "_templatename")
    
        .EXAMPLE
            $search = New-SearchBuilder -Index "sitecore_master_index" -FacetOn @("_templatename")
        #>
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true)]
            [string]$Index,
    
            [string]$Path = "",
    
            [string]$OrderBy = "",
    
            [int]$First = 0,
    
            [int]$Skip = 0,
    
            [int]$Last = 0,
    
            [int]$MaxResults = 0,
    
            [switch]$Strict,
    
            [switch]$IncludeMetadata,
    
            [string[]]$Property = $null,
    
            [Type]$QueryType = $null,
    
            [string[]]$FacetOn = $null,
    
            [int]$FacetMinCount = 1
        )
    
        $builder = @{
            _Index           = $Index
            _Path            = $Path
            _OrderBy         = $OrderBy
            _First           = $First
            _Skip            = $Skip
            _Last            = $Last
            _MaxResults      = $MaxResults
            _Strict          = $Strict.IsPresent
            _IncludeMetadata = $IncludeMetadata.IsPresent
            _Property        = $Property
            _QueryType       = $QueryType
            _FacetOn         = $FacetOn
            _FacetMinCount   = $FacetMinCount
            _PageNumber      = 0
            _Criteria        = [System.Collections.ArrayList]@()
            _IsSearchBuilder = $true
        }
    
        return $builder
    }
    
    function Add-SearchFilter {
        <#
        .SYNOPSIS
            Adds a search filter criterion to the builder.
    
        .PARAMETER SearchBuilder
            The search builder instance from New-SearchBuilder.
    
        .PARAMETER Field
            The index field name to filter on (e.g., "_templatename", "Title", "__Updated").
    
        .PARAMETER Filter
            The filter operation. Use Get-SearchFilter to see all valid values.
            Common values: Equals, Contains, StartsWith, EndsWith, Fuzzy,
            ContainsAll, ContainsAny, DescendantOf, InclusiveRange, ExclusiveRange,
            MatchesRegex, MatchesWildcard, GreaterThan, LessThan.
    
        .PARAMETER Value
            The value to match against. For range filters, pass an array of two values.
    
        .PARAMETER Invert
            Negate the filter (NOT logic).
    
        .PARAMETER Boost
            Lucene relevance boost factor (default: 0 = no boost).
    
        .PARAMETER CaseSensitive
            Enable case-sensitive matching.
    
        .EXAMPLE
            $search | Add-SearchFilter -Field "_templatename" -Filter "Equals" -Value "Article"
    
        .EXAMPLE
            $search | Add-SearchFilter -Field "Title" -Filter "Contains" -Value "Welcome" -Boost 10
        #>
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, ValueFromPipeline = $true)]
            [hashtable]$SearchBuilder,
    
            [Parameter(Mandatory = $true)]
            [string]$Field,
    
            [Parameter(Mandatory = $true)]
            [string]$Filter,
    
            [Parameter(Mandatory = $true)]
            [object]$Value,
    
            [switch]$Invert,
    
            [float]$Boost = 0,
    
            [switch]$CaseSensitive
        )
    
        if (-not $SearchBuilder.ContainsKey('_IsSearchBuilder')) {
            throw "Invalid SearchBuilder object. Did you create it with New-SearchBuilder?"
        }
    
        $criterion = @{
            Filter = $Filter
            Field  = $Field
            Value  = $Value
        }
    
        if ($Invert.IsPresent) { $criterion.Invert = $true }
        if ($Boost -gt 0) { $criterion.Boost = $Boost }
        if ($CaseSensitive.IsPresent) { $criterion.CaseSensitive = $true }
    
        $SearchBuilder._Criteria.Add($criterion) > $null
    }
    
    function Add-TemplateFilter {
        <#
        .SYNOPSIS
            Adds a template name or ID filter.
    
        .PARAMETER Name
            The template name to match (uses _templatename field with Equals filter).
    
        .PARAMETER Id
            The template ID to match (uses _templates field with Contains filter).
    
        .EXAMPLE
            $search | Add-TemplateFilter -Name "Article"
    
        .EXAMPLE
            $search | Add-TemplateFilter -Id "{76036F5E-CBCE-46D1-AF0A-4143F9B557AA}"
        #>
        [CmdletBinding(DefaultParameterSetName = "ByName")]
        param(
            [Parameter(Mandatory = $true, ValueFromPipeline = $true)]
            [hashtable]$SearchBuilder,
    
            [Parameter(Mandatory = $true, ParameterSetName = "ByName")]
            [string]$Name,
    
            [Parameter(Mandatory = $true, ParameterSetName = "ById")]
            [string]$Id
        )
    
        if ($PSCmdlet.ParameterSetName -eq "ByName") {
            Add-SearchFilter -SearchBuilder $SearchBuilder -Field "_templatename" -Filter "Equals" -Value $Name
        }
        else {
            Add-SearchFilter -SearchBuilder $SearchBuilder -Field "_templates" -Filter "Contains" -Value $Id
        }
    }
    
    function Add-FieldContains {
        <#
        .SYNOPSIS
            Adds a Contains filter for a field.
    
        .EXAMPLE
            $search | Add-FieldContains -Field "Title" -Value "Welcome"
        #>
        param(
            [Parameter(Mandatory = $true, ValueFromPipeline = $true)]
            [hashtable]$SearchBuilder,
    
            [Parameter(Mandatory = $true)]
            [string]$Field,
    
            [Parameter(Mandatory = $true)]
            [object]$Value,
    
            [switch]$Invert,
    
            [float]$Boost = 0
        )
    
        $PSBoundParameters.Remove("Field") > $null
        $PSBoundParameters.Remove("Value") > $null
        $PSBoundParameters.Remove("Invert") > $null
        $PSBoundParameters.Remove("Boost") > $null
    
        Add-SearchFilter @PSBoundParameters -Field $Field -Filter "Contains" -Value $Value -Invert:$Invert -Boost $Boost
    }
    
    function Add-FieldEquals {
        <#
        .SYNOPSIS
            Adds an Equals filter for a field.
    
        .EXAMPLE
            $search | Add-FieldEquals -Field "Language" -Value "en"
        #>
        param(
            [Parameter(Mandatory = $true, ValueFromPipeline = $true)]
            [hashtable]$SearchBuilder,
    
            [Parameter(Mandatory = $true)]
            [string]$Field,
    
            [Parameter(Mandatory = $true)]
            [object]$Value,
    
            [switch]$Invert,
    
            [float]$Boost = 0,
    
            [switch]$CaseSensitive
        )
    
        $PSBoundParameters.Remove("Field") > $null
        $PSBoundParameters.Remove("Value") > $null
        $PSBoundParameters.Remove("Invert") > $null
        $PSBoundParameters.Remove("Boost") > $null
        $PSBoundParameters.Remove("CaseSensitive") > $null
    
        Add-SearchFilter @PSBoundParameters -Field $Field -Filter "Equals" -Value $Value -Invert:$Invert -Boost $Boost -CaseSensitive:$CaseSensitive
    }
    
    function Add-DateRangeFilter {
        <#
        .SYNOPSIS
            Adds a date range filter with support for relative date syntax.
    
        .PARAMETER Field
            The date field to filter on (e.g., "__Updated", "__Created").
    
        .PARAMETER From
            The start date (inclusive). Use with -To for absolute ranges.
    
        .PARAMETER To
            The end date (inclusive). Defaults to now if not specified.
    
        .PARAMETER Last
            Relative date shorthand. Supported suffixes:
            d = days, w = weeks, m = months, y = years.
            Examples: "7d" (last 7 days), "2w" (last 2 weeks), "3m" (last 3 months), "1y" (last year).
    
        .EXAMPLE
            $search | Add-DateRangeFilter -Field "__Updated" -Last "7d"
    
        .EXAMPLE
            $search | Add-DateRangeFilter -Field "__Created" -From "2025-01-01" -To "2025-06-30"
        #>
        [CmdletBinding(DefaultParameterSetName = "Relative")]
        param(
            [Parameter(Mandatory = $true, ValueFromPipeline = $true)]
            [hashtable]$SearchBuilder,
    
            [Parameter(Mandatory = $true)]
            [string]$Field,
    
            [Parameter(Mandatory = $true, ParameterSetName = "Absolute")]
            [DateTime]$From,
    
            [Parameter(ParameterSetName = "Absolute")]
            [DateTime]$To,
    
            [Parameter(Mandatory = $true, ParameterSetName = "Relative")]
            [string]$Last
        )
    
        if (-not $SearchBuilder.ContainsKey('_IsSearchBuilder')) {
            throw "Invalid SearchBuilder object. Did you create it with New-SearchBuilder?"
        }
    
        $now = [DateTime]::Now
    
        if ($PSCmdlet.ParameterSetName -eq "Relative") {
            $parsed = ConvertFrom-RelativeDate -RelativeDate $Last
            $fromDate = $parsed
            $toDate = $now
        }
        else {
            $fromDate = $From
            $toDate = if ($PSBoundParameters.ContainsKey('To')) { $To } else { $now }
        }
    
        $criterion = @{
            Filter = "InclusiveRange"
            Field  = $Field
            Value  = @($fromDate, $toDate)
        }
    
        $SearchBuilder._Criteria.Add($criterion) > $null
    }
    
    function Add-SearchFilterGroup {
        <#
        .SYNOPSIS
            Adds a group of filters combined with AND or OR logic.
    
        .DESCRIPTION
            Creates a nested predicate group within the search builder. Use this to
            compose complex queries such as "match any of these templates AND contain
            this text". The group is built using a separate sub-builder that collects
            criteria, then merged into the parent builder.
    
        .PARAMETER SearchBuilder
            The parent search builder instance.
    
        .PARAMETER Operation
            How to combine the filters within this group: "Or" or "And" (default: "Or").
    
        .PARAMETER Group
            A pre-built filter group hashtable from New-SearchFilterGroup.
            Use this pattern for CLM compatibility or when scriptblocks are not available.
    
        .EXAMPLE
            # Using the Group parameter (CLM-safe)
            $group = New-SearchFilterGroup -Operation Or
            $group | Add-TemplateFilter -Name "Article"
            $group | Add-TemplateFilter -Name "Blog Post"
            $search | Add-SearchFilterGroup -Group $group
    
        .EXAMPLE
            # Inline composition
            $group = New-SearchFilterGroup -Operation Or
            $group | Add-FieldEquals -Field "Status" -Value "Published"
            $group | Add-FieldEquals -Field "Status" -Value "Approved"
            $search | Add-SearchFilterGroup -Group $group
        #>
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, ValueFromPipeline = $true)]
            [hashtable]$SearchBuilder,
    
            [string]$Operation = "Or",
    
            [Parameter(Mandatory = $true)]
            [hashtable]$Group
        )
    
        if (-not $SearchBuilder.ContainsKey('_IsSearchBuilder')) {
            throw "Invalid SearchBuilder object. Did you create it with New-SearchBuilder?"
        }
    
        if (-not $Group.ContainsKey('_IsFilterGroup')) {
            throw "Invalid filter group. Did you create it with New-SearchFilterGroup?"
        }
    
        if ($Group._Criteria.Count -eq 0) {
            Write-Warning "Filter group has no criteria. Did you forget to add filters?"
            return
        }
    
        $groupEntry = @{
            _Operation = $Operation
            _Criteria  = $Group._Criteria
        }
    
        $SearchBuilder._Criteria.Add($groupEntry) > $null
    }
    
    function New-SearchFilterGroup {
        <#
        .SYNOPSIS
            Creates a new filter group for composing OR/AND predicate groups.
    
        .DESCRIPTION
            Creates a lightweight group builder that accepts the same Add-* filter
            functions as a SearchBuilder. Pass the completed group to
            Add-SearchFilterGroup to merge it into the parent builder.
    
        .PARAMETER Operation
            How to combine filters in this group: "Or" or "And" (default: "Or").
    
        .EXAMPLE
            $group = New-SearchFilterGroup -Operation Or
            $group | Add-TemplateFilter -Name "Article"
            $group | Add-TemplateFilter -Name "Blog Post"
            $search | Add-SearchFilterGroup -Group $group
        #>
        [CmdletBinding()]
        param(
            [string]$Operation = "Or"
        )
    
        $group = @{
            _Operation     = $Operation
            _Criteria      = [System.Collections.ArrayList]@()
            _IsSearchBuilder = $true
            _IsFilterGroup   = $true
        }
    
        return $group
    }
    
    function Invoke-Search {
        <#
        .SYNOPSIS
            Executes the search builder and returns results with metadata.
    
        .DESCRIPTION
            Converts the builder criteria into Find-Item parameters, executes the
            search, and returns a result object with pagination state. Automatically
            advances the builder's skip position for paged iteration.
    
        .PARAMETER SearchBuilder
            The search builder instance.
    
        .PARAMETER IncludeMetadata
            Override the builder setting to include index metadata.
    
        .EXAMPLE
            $results = $search | Invoke-Search
            $results.Items | ForEach-Object { Write-Host $_.Name }
    
        .EXAMPLE
            # Paged iteration
            $search = New-SearchBuilder -Index "sitecore_master_index" -First 50
            $search | Add-TemplateFilter -Name "Article"
            do {
                $results = $search | Invoke-Search
                $results.Items | ForEach-Object { # process }
            } while ($results.HasMore)
        #>
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, ValueFromPipeline = $true)]
            [hashtable]$SearchBuilder,
    
            [switch]$IncludeMetadata
        )
    
        if (-not $SearchBuilder.ContainsKey('_IsSearchBuilder')) {
            throw "Invalid SearchBuilder object. Did you create it with New-SearchBuilder?"
        }
    
        if ($SearchBuilder.ContainsKey('_IsFilterGroup')) {
            throw "Cannot invoke a filter group directly. Use Add-SearchFilterGroup to add it to a SearchBuilder, then invoke the SearchBuilder."
        }
    
        $includesMeta = $IncludeMetadata.IsPresent -or $SearchBuilder._IncludeMetadata
    
        # Validate fields if Strict mode is enabled
        if ($SearchBuilder._Strict) {
            $searchIndex = [Sitecore.ContentSearch.ContentSearchManager]::GetIndex($SearchBuilder._Index)
            $fnt = $searchIndex.FieldNameTranslator
            $schemaFields = $searchIndex.Schema.AllFieldNames
            $invalidFields = [System.Collections.ArrayList]@()
    
            foreach ($criterion in $SearchBuilder._Criteria) {
                if ($criterion.ContainsKey('Field') -and $criterion.Field -ne "_path") {
                    $fieldName = $criterion.Field
                    $resolved = $fnt.GetIndexFieldName($fieldName)
                    $wasTranslated = $resolved -ne $fieldName
                    $inSchema = $schemaFields -contains $fieldName -or $schemaFields -contains $resolved
                    if (-not $wasTranslated -and -not $inSchema) {
                        $invalidFields.Add($fieldName) > $null
                    }
                }
            }
    
            if ($invalidFields.Count -gt 0) {
                $fieldList = $invalidFields -join "', '"
                throw "Strict mode: The following fields are not indexed in '$($SearchBuilder._Index)': '$fieldList'. Use Get-SearchIndexField -Index '$($SearchBuilder._Index)' to see valid fields."
            }
        }
    
        # Determine effective pagination
        $effectiveFirst = $SearchBuilder._First
        $effectiveSkip = $SearchBuilder._Skip
        $maxResults = $SearchBuilder._MaxResults
    
        # If MaxResults is set but First is not, use MaxResults as First
        if ($effectiveFirst -eq 0 -and $maxResults -gt 0) {
            $effectiveFirst = $maxResults
        }
    
        # Calculate cumulative count for MaxResults safety cap
        $cumulativeCount = $effectiveSkip
        if ($maxResults -gt 0 -and $effectiveFirst -gt 0) {
            $remaining = $maxResults - $cumulativeCount
            if ($remaining -le 0) {
                # Already past the safety cap
                $result = New-PSObject @{
                    Items       = @()
                    HasMore     = $false
                    PageNumber  = $SearchBuilder._PageNumber
                    PageSize    = $SearchBuilder._First
                    TotalCount  = -1
                    Truncated   = $true
                    MaxResults  = $maxResults
                    IndexName   = $SearchBuilder._Index
                    Query       = (ConvertTo-QuerySummary -SearchBuilder $SearchBuilder)
                }
                return $result
            }
            # Cap this page to not exceed MaxResults
            if ($effectiveFirst -gt $remaining) {
                $effectiveFirst = $remaining
            }
        }
    
        # Build the Find-Item parameters
        $findParams = @{
            Index = $SearchBuilder._Index
        }
    
        # Add QueryType if specified
        if ($null -ne $SearchBuilder._QueryType) {
            $findParams.QueryType = $SearchBuilder._QueryType
        }
    
        # Add Property selection if specified
        if ($null -ne $SearchBuilder._Property -and $SearchBuilder._Property.Count -gt 0) {
            $findParams.Property = $SearchBuilder._Property
        }
    
        # Add FacetOn if specified
        if ($null -ne $SearchBuilder._FacetOn -and $SearchBuilder._FacetOn.Count -gt 0) {
            $findParams.FacetOn = $SearchBuilder._FacetOn
            if ($SearchBuilder._FacetMinCount -gt 1) {
                $findParams.FacetMinCount = $SearchBuilder._FacetMinCount
            }
        }
    
        # Build criteria from the builder tree
        $topLevelCriteria = [System.Collections.ArrayList]@()
        $predicates = [System.Collections.ArrayList]@()
    
        foreach ($entry in $SearchBuilder._Criteria) {
            if ($entry.ContainsKey('_Operation')) {
                # This is a group - build a predicate
                $groupCriteria = @($entry._Criteria | ForEach-Object {
                    $c = @{ Filter = $_.Filter; Field = $_.Field; Value = $_.Value }
                    if ($_.ContainsKey('Invert') -and $_.Invert) { $c.Invert = $true }
                    if ($_.ContainsKey('Boost') -and $_.Boost -gt 0) { $c.Boost = $_.Boost }
                    if ($_.ContainsKey('CaseSensitive') -and $_.CaseSensitive) { $c.CaseSensitive = $true }
                    $c
                })
                $operation = if ($entry._Operation -eq "Or") { "Or" } else { "And" }
                $predicate = New-SearchPredicate -Criteria $groupCriteria -Operation $operation
                $predicates.Add($predicate) > $null
            }
            else {
                # Flat criterion
                $topLevelCriteria.Add($entry) > $null
            }
        }
    
        # Combine group predicates with AND
        $combinedPredicate = $null
        if ($predicates.Count -gt 0) {
            $combinedPredicate = $predicates[0]
            for ($i = 1; $i -lt $predicates.Count; $i++) {
                $combinedPredicate = New-SearchPredicate -First $combinedPredicate -Second $predicates[$i] -Operation And
            }
        }
    
        # Add top-level criteria as another AND predicate
        if ($topLevelCriteria.Count -gt 0) {
            $topPredicate = New-SearchPredicate -Criteria @($topLevelCriteria) -Operation And
            if ($null -ne $combinedPredicate) {
                $combinedPredicate = New-SearchPredicate -First $combinedPredicate -Second $topPredicate -Operation And
            }
            else {
                $combinedPredicate = $topPredicate
            }
        }
    
        # Set the predicate on Find-Item
        if ($null -ne $combinedPredicate) {
            $findParams.WherePredicate = $combinedPredicate
        }
    
        # Add path scope
        if (-not [string]::IsNullOrEmpty($SearchBuilder._Path)) {
            $pathItem = Get-Item -Path "master:$($SearchBuilder._Path)" -ErrorAction SilentlyContinue
            if ($null -ne $pathItem) {
                $pathCriteria = @(@{ Filter = "DescendantOf"; Value = $pathItem })
                if ($findParams.ContainsKey('WherePredicate')) {
                    $pathPredicate = New-SearchPredicate -Criteria $pathCriteria
                    $findParams.WherePredicate = New-SearchPredicate -First $findParams.WherePredicate -Second $pathPredicate -Operation And
                }
                else {
                    $findParams.Criteria = $pathCriteria
                }
            }
            else {
                Write-Warning "Path '$($SearchBuilder._Path)' not found. Search will not be scoped."
            }
        }
    
        # Add ordering
        if (-not [string]::IsNullOrEmpty($SearchBuilder._OrderBy)) {
            $findParams.OrderBy = $SearchBuilder._OrderBy
        }
    
        # Add pagination - request one extra to detect HasMore
        $requestCount = $effectiveFirst
        $detectMore = $false
        if ($effectiveFirst -gt 0) {
            $requestCount = $effectiveFirst + 1
            $detectMore = $true
            $findParams.First = $requestCount
        }
    
        if ($effectiveSkip -gt 0) {
            $findParams.Skip = $effectiveSkip
        }
    
        if ($SearchBuilder._Last -gt 0 -and $effectiveFirst -eq 0) {
            $findParams.Last = $SearchBuilder._Last
        }
    
        # Execute the search
        $rawResults = @(Find-Item @findParams)
    
        # Handle FacetOn -- different return shape
        if ($null -ne $SearchBuilder._FacetOn -and $SearchBuilder._FacetOn.Count -gt 0) {
            # Find-Item returns a single FacetResults object; unwrap from array
            $facetResults = if ($rawResults.Count -gt 0) { $rawResults[0] } else { $null }
            $resultProps = @{
                Facets      = $facetResults
                Categories  = if ($null -ne $facetResults) { $facetResults.Categories } else { @() }
                IndexName   = $SearchBuilder._Index
                Query       = (ConvertTo-QuerySummary -SearchBuilder $SearchBuilder)
            }
            if ($includesMeta) {
                $idx = Get-SearchIndex -Name $SearchBuilder._Index -ErrorAction SilentlyContinue
                if ($null -ne $idx) {
                    $resultProps.IndexLastUpdated = $idx.Summary.LastUpdated
                }
            }
            $result = New-PSObject $resultProps
            return $result
        }
    
        $items = $rawResults
    
        # Determine HasMore and trim the extra probe item
        $hasMore = $false
        if ($detectMore -and $items.Count -gt $effectiveFirst) {
            $hasMore = $true
            $items = $items[0..($effectiveFirst - 1)]
        }
    
        # Check MaxResults truncation
        $truncated = $false
        if ($maxResults -gt 0) {
            $newCumulative = $cumulativeCount + $items.Count
            if ($newCumulative -ge $maxResults) {
                $truncated = $true
                $hasMore = $false
            }
        }
    
        # Auto-advance pagination
        if ($SearchBuilder._First -gt 0) {
            $SearchBuilder._Skip = $effectiveSkip + $items.Count
            $SearchBuilder._PageNumber = $SearchBuilder._PageNumber + 1
        }
        elseif ($items.Count -gt 0) {
            $SearchBuilder._PageNumber = 1
        }
    
        # Build result object
        $resultProps = @{
            Items       = $items
            HasMore     = $hasMore
            PageNumber  = $SearchBuilder._PageNumber
            PageSize    = $SearchBuilder._First
            TotalCount  = -1
            Truncated   = $truncated
            MaxResults  = $maxResults
            IndexName   = $SearchBuilder._Index
            Query       = (ConvertTo-QuerySummary -SearchBuilder $SearchBuilder)
        }
    
        if ($includesMeta) {
            $idx = Get-SearchIndex -Name $SearchBuilder._Index -ErrorAction SilentlyContinue
            if ($null -ne $idx) {
                $resultProps.IndexLastUpdated = $idx.Summary.LastUpdated
            }
        }
    
        $result = New-PSObject $resultProps
        return $result
    }
    
    function Reset-SearchBuilder {
        <#
        .SYNOPSIS
            Resets the pagination state of a search builder for re-use.
    
        .DESCRIPTION
            Sets Skip back to 0 and PageNumber back to 0, allowing you to
            re-run the same query from the beginning.
    
        .EXAMPLE
            Reset-SearchBuilder -SearchBuilder $search
            # or
            $search | Reset-SearchBuilder
        #>
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, ValueFromPipeline = $true)]
            [hashtable]$SearchBuilder
        )
    
        if (-not $SearchBuilder.ContainsKey('_IsSearchBuilder')) {
            throw "Invalid SearchBuilder object. Did you create it with New-SearchBuilder?"
        }
    
        $SearchBuilder._Skip = 0
        $SearchBuilder._PageNumber = 0
    }
    
    function Get-SearchFilter {
        <#
        .SYNOPSIS
            Lists all valid filter types for use with Add-SearchFilter.
    
        .DESCRIPTION
            Returns all valid FilterType values with descriptions, making the
            filter vocabulary discoverable at runtime. Use this to see what
            filter operations are available for Find-Item criteria.
    
        .EXAMPLE
            Get-SearchFilter
    
        .EXAMPLE
            Get-SearchFilter | Where-Object { $_.Name -like "*Range*" }
        #>
        [CmdletBinding()]
        param()
    
        $filters = @(
            @{ Name = "Equals";          Description = "Exact match on field value" }
            @{ Name = "StartsWith";      Description = "Field value starts with the specified text" }
            @{ Name = "Contains";        Description = "Field value contains the specified text" }
            @{ Name = "ContainsAll";     Description = "Field value contains ALL of the specified keywords" }
            @{ Name = "ContainsAny";     Description = "Field value contains ANY of the specified keywords" }
            @{ Name = "EndsWith";        Description = "Field value ends with the specified text" }
            @{ Name = "DescendantOf";    Description = "Item is a descendant of the specified item (searches _path field)" }
            @{ Name = "Fuzzy";           Description = "Fuzzy/approximate match using Lucene similarity" }
            @{ Name = "InclusiveRange";  Description = "Value falls within range [min, max] (inclusive). Pass array of two values." }
            @{ Name = "ExclusiveRange";  Description = "Value falls within range (min, max) (exclusive). Pass array of two values." }
            @{ Name = "MatchesRegex";    Description = "Field value matches the specified regular expression" }
            @{ Name = "MatchesWildcard"; Description = "Field value matches the specified wildcard pattern (e.g., 'test*')" }
            @{ Name = "GreaterThan";     Description = "Field value is greater than the specified value (supports DateTime, int, double)" }
            @{ Name = "LessThan";        Description = "Field value is less than the specified value (supports DateTime, int, double)" }
        )
    
        $filters | ForEach-Object { New-PSObject $_ }
    }
    
    function Get-SearchIndexField {
        <#
        .SYNOPSIS
            Lists the fields available in a search index.
    
        .DESCRIPTION
            Queries the specified search index configuration to return all indexed
            field names. Use this to verify field names before building queries,
            especially with the -Strict flag on New-SearchBuilder.
    
        .PARAMETER Index
            The search index name to inspect.
    
        .EXAMPLE
            Get-SearchIndexField -Index "sitecore_master_index"
    
        .EXAMPLE
            Get-SearchIndexField -Index "sitecore_master_index" | Where-Object { $_.FieldName -like "*template*" }
        #>
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true)]
            [string]$Index
        )
    
        $searchIndex = [Sitecore.ContentSearch.ContentSearchManager]::GetIndex($Index)
    
        if ($null -eq $searchIndex) {
            Write-Warning "Index '$Index' not found."
            return
        }
    
        $schema = $searchIndex.Schema
        if ($null -eq $schema -or $null -eq $schema.AllFieldNames) {
            Write-Warning "No schema available for index '$Index'."
            return
        }
    
        $schema.AllFieldNames | Sort-Object | ForEach-Object {
            New-PSObject @{
                FieldName = $_
                IndexName = $Index
            }
        }
    }
    
    # --- Internal helper functions ---
    
    function ConvertFrom-RelativeDate {
        <#
        .SYNOPSIS
            Converts a relative date string to an absolute DateTime.
        #>
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true)]
            [string]$RelativeDate
        )
    
        if ($RelativeDate -notmatch '^(\d+)([dwmy])$') {
            throw "Invalid relative date format: '$RelativeDate'. Use format like '7d', '2w', '3m', '1y' (d=days, w=weeks, m=months, y=years)."
        }
    
        $amount = [int]$Matches[1]
        $unit = $Matches[2]
        $now = [DateTime]::Now
    
        switch ($unit) {
            "d" { return $now.AddDays(-$amount) }
            "w" { return $now.AddDays(-($amount * 7)) }
            "m" { return $now.AddMonths(-$amount) }
            "y" { return $now.AddYears(-$amount) }
        }
    }
    
    function ConvertTo-QuerySummary {
        <#
        .SYNOPSIS
            Builds a human-readable summary of the search builder criteria.
        #>
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true)]
            [hashtable]$SearchBuilder
        )
    
        $parts = [System.Collections.ArrayList]@()
    
        foreach ($entry in $SearchBuilder._Criteria) {
            if ($entry.ContainsKey('_Operation')) {
                $groupParts = @($entry._Criteria | ForEach-Object {
                    "$($_.Field) $($_.Filter) '$($_.Value)'"
                })
                $op = $entry._Operation
                $parts.Add("($($groupParts -join " $op "))") > $null
            }
            else {
                $val = if ($entry.Value -is [array]) { ($entry.Value -join ", ") } else { $entry.Value }
                $prefix = if ($entry.ContainsKey('Invert') -and $entry.Invert) { "NOT " } else { "" }
                $parts.Add("$prefix$($entry.Field) $($entry.Filter) '$val'") > $null
            }
        }
    
        if ($parts.Count -eq 0) { return "(no criteria)" }
    
        return $parts -join " AND "
    }
