    # Helper utility functions
    
    function Copy-DialogBuilder {
        <#
        .SYNOPSIS
            Creates a deep copy of a dialog builder instance.
    
        .DESCRIPTION
            Useful for creating variations of a dialog configuration without
            modifying the original. All parameters and settings are cloned.
    
        .EXAMPLE
            $dialog2 = $dialog | Copy-DialogBuilder
    
        .RETURNS
            A new dialog builder instance with copied configuration.
        #>
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, ValueFromPipeline = $true)]
            [hashtable]$DialogBuilder
        )
    
        if (-not $DialogBuilder.ContainsKey('_IsDialogBuilder')) {
            throw "Invalid DialogBuilder object. Did you create it with New-DialogBuilder?"
        }
    
        # Create new builder with same properties
        $newBuilder = @{
            _Title            = $DialogBuilder._Title
            _Description      = $DialogBuilder._Description
            _Width            = $DialogBuilder._Width
            _Height           = $DialogBuilder._Height
            _OkButtonName     = $DialogBuilder._OkButtonName
            _CancelButtonName = $DialogBuilder._CancelButtonName
            _ShowHints        = $DialogBuilder._ShowHints
            _Icon             = $DialogBuilder._Icon
            _Parameters       = [System.Collections.ArrayList]@()
            _Variables        = @{}
            _IsDialogBuilder  = $true
        }
    
        # Deep copy parameters
        foreach ($param in $DialogBuilder._Parameters) {
            $newParam = @{}
            foreach ($key in $param.Keys) {
                $newParam[$key] = $param[$key]
            }
            $newBuilder._Parameters.Add($newParam) > $null
        }
    
        # Copy variables
        foreach ($key in $DialogBuilder._Variables.Keys) {
            $newBuilder._Variables[$key] = $DialogBuilder._Variables[$key]
        }
    
        return $newBuilder
    }
    
    function Remove-DialogField {
        <#
        .SYNOPSIS
            Removes a field from the dialog builder by name.
    
        .DESCRIPTION
            Allows removal of previously added fields from the dialog configuration.
            This is useful when building dialogs dynamically based on conditions.
    
        .EXAMPLE
            $dialog | Remove-DialogField -Name "optionalField"
        #>
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, ValueFromPipeline = $true)]
            [hashtable]$DialogBuilder,
    
            [Parameter(Mandatory = $true)]
            [string]$Name
        )
    
        if (-not $DialogBuilder.ContainsKey('_IsDialogBuilder')) {
            throw "Invalid DialogBuilder object. Did you create it with New-DialogBuilder?"
        }
    
        # Rebuild the ArrayList without the named field
        $remaining = [System.Collections.ArrayList]@()
        foreach ($param in $DialogBuilder._Parameters) {
            if ($param.Name -ne $Name) {
                $remaining.Add($param) > $null
            }
        }
        $DialogBuilder._Parameters = $remaining
    
        # Remove from _Variables
        if ($DialogBuilder._Variables.ContainsKey($Name)) {
            $DialogBuilder._Variables.Remove($Name)
        }
    }
    
    function ConvertTo-DialogBuilderJson {
        <#
        .SYNOPSIS
            Converts dialog builder configuration to JSON format.
    
        .DESCRIPTION
            Exports the dialog structure to JSON for documentation, debugging,
            or sharing dialog configurations.
    
        .PARAMETER DialogBuilder
            The dialog builder instance to convert.
    
        .PARAMETER FilePath
            Optional file path to save the JSON. If not specified, returns JSON string.
    
        .EXAMPLE
            $json = $dialog | ConvertTo-DialogBuilderJson
    
        .EXAMPLE
            $dialog | ConvertTo-DialogBuilderJson -FilePath "C:\temp\dialog.json"
        #>
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, ValueFromPipeline = $true)]
            [hashtable]$DialogBuilder,
    
            [string]$FilePath = ""
        )
    
        if (-not $DialogBuilder.ContainsKey('_IsDialogBuilder')) {
            throw "Invalid DialogBuilder object. Did you create it with New-DialogBuilder?"
        }
    
        # Create exportable structure (public names, no internal state)
        $exportObj = @{
            Title            = $DialogBuilder._Title
            Description      = $DialogBuilder._Description
            Width            = $DialogBuilder._Width
            Height           = $DialogBuilder._Height
            OkButtonName     = $DialogBuilder._OkButtonName
            CancelButtonName = $DialogBuilder._CancelButtonName
            ShowHints        = $DialogBuilder._ShowHints
            Icon             = $DialogBuilder._Icon
            Parameters       = @($DialogBuilder._Parameters)
        }
    
        $json = $exportObj | ConvertTo-Json -Depth 10
    
        if (-not [string]::IsNullOrEmpty($FilePath)) {
            $json | Out-File -FilePath $FilePath -Encoding UTF8
            Write-Host "Dialog configuration exported to: $FilePath" -ForegroundColor Green
        }
    
        return $json
    }
