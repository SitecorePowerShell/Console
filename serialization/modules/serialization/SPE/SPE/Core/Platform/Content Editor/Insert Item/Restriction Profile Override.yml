- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    $item = Get-Item -Path .
    if($item -eq $null) { return }
    
    $name = Show-Input -Prompt "Enter a name for the new Restriction Profile Override item:"
    if([string]::IsNullOrEmpty($name)) { return }
    $path = "$($item.ItemPath)/$($name)"
    $template = Get-Item -Path "master:" -ID "{AF864A3C-6D3D-4889-AFEF-9B1D427F4EA8}"
    New-Item -ItemType $template.ItemPath -Path $path
    Send-SheerMessage -OnScriptEnd -Name "item:refresh" -Parameters @{
        id=$item.ID;
        language=$item.Language;
        version=$item.Version
    }
    Close-Window
