ID: "dde4eaa6-5b99-48ec-9dd4-bb4a8ceae443"
Parent: "52ead8ce-f95a-4283-b98b-5264d83e8e58"
Template: "dd22f1b3-bd87-4db2-9e7d-f7a496888d43"
Path: /sitecore/system/Modules/PowerShell/Script Library/SPE/Core/Remoting/Content Editor/Insert Item/Remoting Policy
SharedFields:
- ID: "06d5295c-ed2f-4a54-9bf2-26228d113318"
  Hint: __Icon
  Value: Office/32x32/brickwall.png
- ID: "1c76313e-3c8c-4807-a826-135d10c39299"
