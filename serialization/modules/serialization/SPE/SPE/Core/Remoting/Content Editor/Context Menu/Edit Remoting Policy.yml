    </ruleset>
- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    if(-not $SitecoreContextItem -or $SitecoreContextItem.TemplateID -ne "{AF864A3C-6D3D-4889-AFEF-9B1D427F4EA8}") {
        Close-Window
        Exit
    }
    
    $item = $SitecoreContextItem | Initialize-Item
    $mode = "Edit"
    $dialogIcon = [regex]::Replace($item.Appearance.Icon, "Office", "OfficeWhite", [System.Text.RegularExpressions.RegexOptions]::IgnoreCase)
    
    Get-Item -Path "master:" -ID "{B1DA4078-58B8-4A95-AB55-359720B8409B}" | Invoke-Script
    
    if($dialogResult -ne "ok") {
        Close-Window
        Exit
    }
    
    New-UsingBlock (New-Object Sitecore.Data.BulkUpdateContext) {
        $item.Editing.BeginEdit()
        $item["FullLanguage"] = if($languageMode -eq "FullLanguage") { "1" } else { "" }
        $item["AllowedCommands"] = $commandText
        $item["AuditLevel"] = $auditLevel
        $item["ApprovedScripts"] = if($approvedScripts) { $approvedScripts -join "|" } else { "" }
        $item.Editing.EndEdit() > $null
    }
    
    Invoke-JavaScript -OnScriptEnd -Script "scForm.invoke('item:load(id=$($item.ID),language=$($item.Language),version=$($item.Version))')"
    
    Close-Window
