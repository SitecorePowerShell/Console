  Hint: ShowRule
  Value: |
    <ruleset>
      <rule
        uid="{5C440F09-3F03-47C3-8583-E3F03C029340}"
        name="Only show for Remoting Policy items">
        <conditions>
          <condition
            id="{5DE6D53E-EA62-4D17-8BDD-FEBCD80AC07B}"
            uid="61B234184D454DF9902AF163A5F2E26B"
            templateid="{AF864A3C-6D3D-4889-AFEF-9B1D427F4EA8}" />
        </conditions>
