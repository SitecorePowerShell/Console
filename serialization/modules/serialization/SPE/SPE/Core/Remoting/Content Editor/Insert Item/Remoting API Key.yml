              uid="B2C3D4E5F6A74B89C0D1E2F3A4B5C6D7"
              operatorid="{10537C58-1684-4CAB-B4C0-40C10907CE31}"
              value="{529AD80B-CACA-43D3-A321-094E92BAF9A9}" />
            <condition
              id="{5DE6D53E-EA62-4D17-8BDD-FEBCD80AC07B}"
              uid="C3D4E5F6A7B84C90D1E2F3A4B5C6D7E8"
