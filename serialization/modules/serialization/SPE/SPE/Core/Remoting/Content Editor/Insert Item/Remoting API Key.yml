- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    if(-not $SitecoreContextItem -or $SitecoreContextItem.TemplateID -ne "{9DC763FC-E1EA-4B37-8223-EA5A7712D307}") {
        Close-Window
        Exit
    }
    
    Import-Function -Name DialogBuilder
    
    $rng = [System.Security.Cryptography.RNGCryptoServiceProvider]::new()
    $kidBytes = New-Object byte[] 12
    $rng.GetBytes($kidBytes)
    $generatedAccessKeyId = "spe_" + [System.BitConverter]::ToString($kidBytes).Replace("-","").ToLower()
    $secretBytes = New-Object byte[] 32
    $rng.GetBytes($secretBytes)
    $generatedSecret = [System.BitConverter]::ToString($secretBytes).Replace("-","")
    $rng.Dispose()
    
    $dialog = New-DialogBuilder -Title "Create Remoting API Key" `
        -Description "Creates a new API Key for SPE Remoting authentication. The Access Key Id is included in the JWT header for direct key lookup." `
        -Width 700 -Height 600 -OkButtonName "Create" -ShowHints `
        -Icon ([regex]::Replace($PSScript.Appearance.Icon, "Office", "OfficeWhite", [System.Text.RegularExpressions.RegexOptions]::IgnoreCase))
    
    $dialog | Add-TextField -Name "name" -Title "Name" -Placeholder "My API Key" `
        -Tooltip "A descriptive name for this API key." -Mandatory -Tab "General"
    
    $dialog | Add-TextField -Name "accessKeyId" -Title "Access Key Id" -Value $generatedAccessKeyId `
        -Tooltip "Unique identifier sent in the JWT kid header. Auto-generated but can be customized." `
        -Mandatory -Tab "Authentication"
    
    $dialog | Add-TextField -Name "sharedSecret" -Title "Shared Secret" -Value $generatedSecret `
        -Tooltip "HMAC signing key shared between client and server. Auto-generated (64 hex chars, 256 bits). Minimum lengths per RFC 7518: HS256 = 32 chars, HS384 = 48 chars, HS512 = 64 chars." `
        -Mandatory -Tab "Authentication"
    
    $dialog | Add-DateTimePicker -Name "expires" -Title "Expires" `
        -Tooltip "Optional expiration date. After this date the key is automatically rejected. Leave empty for no expiration." `
        -Tab "Authentication"
    
    $dialog | Add-UserPicker -Name "impersonateUser" -Title "Impersonate User" `
        -Tooltip "The Sitecore user identity used when executing scripts with this key." `
        -Mandatory -Tab "Authorization"
    
    $policy = Get-Item -Path "master:" -ID "{59B24247-999C-4298-B297-53C548E6D6E9}"
    $dialog | Add-Droplink -Name "policy" -Title "Remoting Policy" -Value $policy `
        -Tooltip "Controls what commands and scripts this key can execute." `
        -Source "script:{1993BD1B-0004-41BD-A857-4D293E4EA884}" `
        -Tab "Authorization"
    
    $dialog | Add-TextField -Name "requestLimit" -Title "Request Limit" -IsNumber `
        -Tooltip "Maximum requests allowed within the throttle window. Leave empty to disable rate limiting." `
        -Tab "Throttling"
    
    $dialog | Add-TextField -Name "throttleWindow" -Title "Throttle Window (seconds)" -IsNumber `
        -Tooltip "Duration in seconds for the rate limiting window (e.g. 60 for per-minute limiting)." `
        -Tab "Throttling"
    
    $dialog | Add-Dropdown -Name "throttleAction" -Title "Throttle Action" -Value "" `
        -Options ([ordered]@{ "Block (HTTP 429)" = "Block"; "Bypass (allow but log)" = "Bypass" }) `
        -Placeholder "Select an action" `
        -Tooltip "Block rejects with HTTP 429. Bypass allows the request through and logs that the limit was exceeded." `
        -Tab "Throttling"
    
    $dialog | Add-InfoText -Name "rateLimitInfo" -Title "Response Headers" `
        -Value "When enabled, every response includes X-RateLimit-Limit, X-RateLimit-Remaining, and X-RateLimit-Reset headers." `
        -Tab "Throttling"
    
    $validator = {
        $proposedName = $variables.name.Value
        if($existingKeyNames | Where-Object { $_ -eq $proposedName }) {
            $variables.name.Error = "An item named '$proposedName' already exists."
        }
        if($variables.accessKeyId.Value.Length -lt 8) {
            $variables.accessKeyId.Error = "Access Key Id must be at least 8 characters."
        }
        if($variables.sharedSecret.Value.Length -lt 32) {
            $variables.sharedSecret.Error = "Shared Secret must be at least 32 characters. RFC 7518 requires: HS256 = 32 chars, HS384 = 48 chars, HS512 = 64 chars."
        }
        if([string]::IsNullOrEmpty($variables.impersonateUser.Value)) {
            $variables.impersonateUser.Error = "Impersonate User is required. This determines the Sitecore identity for script execution."
        }
        $policyTemplateId = "{AF864A3C-6D3D-4889-AFEF-9B1D427F4EA8}"
        if(!$variables.policy.Value -or $variables.policy.Value.TemplateID.ToString() -ne $policyTemplateId) {
            $variables.policy.Error = "Please select a Remoting Policy."
        }
        $limit = $variables.requestLimit.Value
        $window = $variables.throttleWindow.Value
        if($limit -gt 0 -and $window -le 0) {
            $variables.throttleWindow.Error = "Throttle Window is required when Request Limit is set."
        }
    }
    
    $result = $dialog | Invoke-Dialog -Validator $validator -ValidatorParameters @{ existingKeyNames = $SitecoreContextItem.Children.Name }
    
    if($result.Result -ne "ok") {
        Close-Window
        Exit
    }
    
    $item = New-Item -Path $SitecoreContextItem.ProviderPath -Name $name -ItemType "{55AB1AA8-890E-401E-AF06-094CA21E0E2D}"
    New-UsingBlock (New-Object Sitecore.Data.BulkUpdateContext) {
        $item.Editing.BeginEdit()
        $item["Access Key Id"] = $accessKeyId
        $item["Shared Secret"] = $sharedSecret
        $item["Impersonate User"] = $impersonateUser | Select-Object -First 1
        if($policy) {
            $item["Policy"] = $policy.ID
        }
        $item["Request Limit"] = if($requestLimit) { $requestLimit.ToString() } else { "" }
        $item["Throttle Window"] = if($throttleWindow) { $throttleWindow.ToString() } else { "" }
        $item["Throttle Action"] = $throttleAction
        if($expires -and $expires -ne [DateTime]::MinValue) {
            $item["Expires"] = [Sitecore.DateUtil]::ToIsoDate($expires)
        }
        $item.Editing.EndEdit() > $null
    }
    
    Invoke-JavaScript -OnScriptEnd -Script "scForm.invoke('item:load(id=$($item.ID),language=$($item.Language),version=$($item.Version))')"
    
    Close-Window
