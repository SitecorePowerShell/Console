Path: "/sitecore/system/Modules/PowerShell/Script Library/SPE/Core/Remoting/Shared/Get-WebApiScriptRoots"
SharedFields:
- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    # Returns Web API scripts across all modules for the Approved Scripts Multilist.
    # Used by the Remoting Policy template's Script Approval section.
    $roots = Get-SpeModuleFeatureRoot -Feature "webAPI"
    foreach ($root in $roots) {
        $scripts = Get-ChildItem -Path "$($root.Database.Name):$($root.Paths.Path)" -Recurse |
            Where-Object { $_.TemplateID -eq "{DD22F1B3-BD87-4DB2-9E7D-F7A496888D43}" }
        if ($scripts) {
            $root
        }
    }
