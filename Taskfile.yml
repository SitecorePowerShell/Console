version: "3"

tasks:
  init:
    desc: Set up local dev environment (license, certs, .env)
    cmds:
      - powershell -File scripts/init.ps1 {{.CLI_ARGS}}

  up:
    desc: Start Docker environment and open Sitecore login
    cmds:
      - powershell -File scripts/up.ps1

  down:
    desc: Stop Docker environment
    cmds:
      - docker compose down

  logs:
    desc: Tail CM container logs
    cmds:
      - docker compose logs -f cm

  build:
    desc: Build the solution
    preconditions:
      - sh: test -f Spe.sln
        msg: "Spe.sln not found. Are you in the repository root?"
    cmds:
      - powershell -Command "& 'C:/Program Files/Microsoft Visual Studio/18/Community/MSBuild/Current/Bin/MSBuild.exe' Spe.sln -t:Build -p:Configuration=Debug"

  deploy:
    desc: Deploy build output to Docker container
    deps: [build]
    #preconditions:
    #  - sh: docker compose ps cm --format '{{.Health}}' | findstr /C:"healthy"
    #    msg: "CM container is not healthy. Run 'task up' and wait for startup."
    cmds:
      - powershell -File src/Post_Build.ps1

  pull:
    desc: Pull serialized items from Sitecore to disk
    cmds:
      - powershell -File scripts/ser.ps1 -Category ser -Command pull

  push:
    desc: Push serialized items from disk to Sitecore
    cmds:
      - powershell -File scripts/ser.ps1 -Category ser -Command push

  watch:
    desc: Watch for item changes in Sitecore and serialize automatically
    cmds:
      - powershell -File scripts/ser.ps1 -Category ser -Command watch

  index:list:
    desc: List all search indexes and their status
    cmds:
      - powershell -File scripts/ser.ps1 -Category index -Command list

  index:rebuild:
    desc: Rebuild all search indexes
    cmds:
      - powershell -File scripts/ser.ps1 -Category index -Command rebuild

  index:schema-populate:
    desc: Populate managed schema for search indexes
    cmds:
      - powershell -File scripts/ser.ps1 -Category index -Command schema-populate

  maintenance:
    desc: Run full index maintenance (list, schema-populate, rebuild)
    cmds:
      - task: index:list
      - task: index:schema-populate
      - task: index:rebuild

  generate:
    desc: Generate .dat files from serialized content
    preconditions:
      - sh: test -d serialization/modules
        msg: "Serialization modules not found in serialization/modules/."
    cmds:
      - powershell -File scripts/generate-dat.ps1

  release:
    desc: Build release packages
    preconditions:
      - sh: docker compose ps cm --format '{{.Health}}' | findstr /C:"healthy"
        msg: "CM container is not healthy. Run 'task up' and wait for startup."
    cmds:
      - powershell -File scripts/build-release.ps1

  verify:
    desc: Validate packages against serialized items
    preconditions:
      - sh: test -d _output
        msg: "No packages found in _output/. Run 'task release' first."
    cmds:
      - powershell -File scripts/verify-packages.ps1

  test:deploy-configs:
    desc: Deploy test config patches to CM container
    preconditions:
      - sh: docker compose ps cm --format '{{.Health}}' | findstr /C:"healthy"
        msg: "CM container is not healthy. Run 'task up' and wait for startup."
    vars:
      CM_CONTAINER: "spe-cm-1" # adjust if your container name is different
    cmds:
      - for f in tests/configs/*.config; do docker cp "$f" "{{.CM_CONTAINER}}:C:/inetpub/wwwroot/App_Config/Include/z.Spe"; done

  test:
    desc: Run integration tests
    deps: [test:deploy-configs]
    preconditions:
      - sh: docker compose ps cm --format '{{.Health}}' | findstr /C:"healthy"
        msg: "CM container is not healthy. Run 'task up' and wait for startup."
    cmds:
      - powershell -File tests/unit/Run-Tests.ps1
      - powershell -File tests/integration/Run-RemotingTests.ps1

  clean:
    desc: Clean build artifacts
    cmds:
      - powershell -File scripts/clean.ps1
